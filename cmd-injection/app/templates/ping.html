<!DOCTYPE html>
<html>
<head><title>NetProbe - Ping</title></head>
<body>
  <h1>Ping Tool</h1>
  <form method="POST">
    <label>Host / IP: <input type="text" name="host" value="{{ host }}" placeholder="e.g. 127.0.0.1"></label>
    <button type="submit">Ping</button>
  </form>
  {% if error %}<p style="color:red">{{ error }}</p>{% endif %}
  {% if output %}
  <h2>Output</h2>
  <pre>{{ output }}</pre>
  {% endif %}
  <a href="/">Back</a>
</body>
</html>
